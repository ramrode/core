name: HA+3GPP integration tests

permissions:
  contents: read

on:
  workflow_call:

jobs:
  ha3gpp-integration-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Ella Core image from GitHub Artifact
        uses: actions/download-artifact@v8
        with:
          name: ellacore-image-amd64

      - name: Download Ella Core Tester image from GitHub Artifact
        uses: actions/download-artifact@v8
        with:
          name: ellacore-tester-image-amd64

      - name: Load images into Docker
        run: |
          docker load -i ellacore_latest-amd64.tar
          docker load -i ellacore_tester_latest-amd64.tar

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install libpcap headers
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Run HA+3GPP integration tests
        env:
          HA_CLUSTER_LOG_DIR: ${{ runner.temp }}/ha-cluster-logs
        run: |
          INTEGRATION=1 go test ./integration/... -run TestIntegration3GPPHAFailover -v -timeout 15m

      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ha3gpp-cluster-logs
          path: ${{ runner.temp }}/ha-cluster-logs
          if-no-files-found: ignore
          retention-days: 7
