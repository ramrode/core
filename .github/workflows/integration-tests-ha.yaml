name: HA integration tests

permissions:
  contents: read

on:
  workflow_call:

jobs:
  ha-integration-test:
    strategy:
      fail-fast: false
      matrix:
        ip_version: [ipv4, ipv6, dualstack]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Container image from GitHub Artifact
        uses: actions/download-artifact@v8
        with:
          name: ellacore-image-amd64

      - name: Load container image
        run: |
          docker load -i ellacore_latest-amd64.tar

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run HA integration tests
        env:
          HA_CLUSTER_LOG_DIR: ${{ runner.temp }}/ha-cluster-logs
        run: |
          INTEGRATION=1 IP_VERSION=${{ matrix.ip_version }} go test ./integration/... -run TestIntegrationHA -v -timeout 15m

      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ha-cluster-logs-${{ matrix.ip_version }}
          path: ${{ runner.temp }}/ha-cluster-logs
          if-no-files-found: ignore
          retention-days: 7
